kind = "web"
previewPath = "/"
title = "VitaSense AI"
version = "1.0.0"
id = "artifacts/vitasense"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21332

[services.development]
run = "pnpm --filter @workspace/vitasense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vitasense", "run", "build" ]
publicDir = "artifacts/vitasense/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21332"
BASE_PATH = "/"
