openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VitaSense AI – symptom analysis and health guidance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: Auth
  - name: symptoms
  - name: analyses
  - name: dashboard
  - name: profile
  - name: tips
  - name: checkup
  - name: openai

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to OIDC.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect on success or failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to OIDC logout.

  /symptoms/analyze:
    post:
      operationId: analyzeSymptoms
      tags: [symptoms]
      summary: Run AI-powered symptom analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SymptomInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /symptoms/suggestions:
    get:
      operationId: getSymptomSuggestions
      tags: [symptoms]
      summary: Get symptom autocomplete suggestions
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of symptom suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SymptomSuggestion"

  /analyses:
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List all saved analyses for current user
      responses:
        "200":
          description: List of saved analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedAnalysis"
    post:
      operationId: saveAnalysis
      tags: [analyses]
      summary: Save an analysis result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedAnalysisInput"
      responses:
        "201":
          description: Saved analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedAnalysis"

  /analyses/{id}:
    get:
      operationId: getAnalysis
      tags: [analyses]
      summary: Get a saved analysis by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved analysis detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedAnalysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteAnalysis
      tags: [analyses]
      summary: Delete a saved analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent:
    get:
      operationId: getRecentAnalyses
      tags: [dashboard]
      summary: Get 5 most recent analyses
      responses:
        "200":
          description: Recent analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedAnalysis"

  /dashboard/urgency-breakdown:
    get:
      operationId: getUrgencyBreakdown
      tags: [dashboard]
      summary: Get urgency level distribution
      responses:
        "200":
          description: Urgency breakdown counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UrgencyCount"

  /profile:
    get:
      operationId: getUserProfile
      tags: [profile]
      summary: Get the authenticated user's health profile
      responses:
        "200":
          description: User health profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: upsertUserProfile
      tags: [profile]
      summary: Create or update user health profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tips/daily:
    get:
      operationId: getDailyTips
      tags: [tips]
      summary: Get daily health tips
      responses:
        "200":
          description: List of daily health tips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthTip"

  /checkup:
    get:
      operationId: listCheckups
      tags: [checkup]
      summary: List weekly checkups for current user
      responses:
        "200":
          description: List of checkups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyCheckup"
    post:
      operationId: submitCheckup
      tags: [checkup]
      summary: Submit a weekly checkup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyCheckupInput"
      responses:
        "201":
          description: Created checkup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyCheckup"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /checkup/wellness:
    get:
      operationId: getWellnessScore
      tags: [checkup]
      summary: Get current wellness score
      responses:
        "200":
          description: Wellness score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WellnessScore"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message and receive a streaming response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SymptomInput:
      type: object
      required: [symptoms, duration, ageRange, severity]
      properties:
        symptoms:
          type: array
          items:
            type: string
          minItems: 1
        duration:
          type: string
          enum: [few_hours, one_day, several_days, one_week_plus, chronic]
        ageRange:
          type: string
          enum: [child, teen, adult, elderly]
        severity:
          type: string
          enum: [mild, moderate, severe, emergency]
        additionalNotes:
          type: ["string", "null"]

    AnalysisResult:
      type: object
      required: [urgencyLevel, urgencyLabel, possibleConditions, lifestyleAdvice, whenToSeeDoctor, disclaimer]
      properties:
        urgencyLevel:
          type: string
          enum: [mild_concern, moderate_concern, seek_medical_attention, emergency_care]
        urgencyLabel:
          type: string
        possibleConditions:
          type: array
          items:
            $ref: "#/components/schemas/PossibleCondition"
        lifestyleAdvice:
          type: array
          items:
            type: string
        whenToSeeDoctor:
          type: array
          items:
            type: string
        disclaimer:
          type: string
        summary:
          type: ["string", "null"]

    PossibleCondition:
      type: object
      required: [name, description, likelihood, commonCauses, riskFactors, basicApproaches]
      properties:
        name:
          type: string
        description:
          type: string
        likelihood:
          type: integer
          description: Percentage likelihood 0-100
        commonCauses:
          type: array
          items:
            type: string
        riskFactors:
          type: array
          items:
            type: string
        basicApproaches:
          type: array
          items:
            type: string

    SymptomSuggestion:
      type: object
      required: [id, label, category]
      properties:
        id:
          type: string
        label:
          type: string
        category:
          type: string

    SavedAnalysis:
      type: object
      required: [id, symptoms, duration, ageRange, severity, urgencyLevel, urgencyLabel, possibleConditions, lifestyleAdvice, whenToSeeDoctor, createdAt]
      properties:
        id:
          type: integer
        symptoms:
          type: array
          items:
            type: string
        duration:
          type: string
        ageRange:
          type: string
        severity:
          type: string
        urgencyLevel:
          type: string
        urgencyLabel:
          type: string
        possibleConditions:
          type: string
        lifestyleAdvice:
          type: string
        whenToSeeDoctor:
          type: string
        summary:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SavedAnalysisInput:
      type: object
      required: [symptoms, duration, ageRange, severity, urgencyLevel, urgencyLabel, possibleConditions, lifestyleAdvice, whenToSeeDoctor]
      properties:
        symptoms:
          type: array
          items:
            type: string
        duration:
          type: string
        ageRange:
          type: string
        severity:
          type: string
        urgencyLevel:
          type: string
        urgencyLabel:
          type: string
        possibleConditions:
          type: string
        lifestyleAdvice:
          type: string
        whenToSeeDoctor:
          type: string
        summary:
          type: ["string", "null"]

    DashboardStats:
      type: object
      required: [totalAnalyses, thisWeek, emergencyCount, mostCommonSymptom]
      properties:
        totalAnalyses:
          type: integer
        thisWeek:
          type: integer
        emergencyCount:
          type: integer
        mostCommonSymptom:
          type: ["string", "null"]

    UrgencyCount:
      type: object
      required: [urgencyLevel, urgencyLabel, count]
      properties:
        urgencyLevel:
          type: string
        urgencyLabel:
          type: string
        count:
          type: integer

    UserProfile:
      type: object
      required: [userId, allergies]
      properties:
        userId:
          type: string
        genotype:
          type: ["string", "null"]
        bloodGroup:
          type: ["string", "null"]
        sex:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        allergies:
          type: array
          items:
            type: string

    UserProfileInput:
      type: object
      properties:
        genotype:
          type: ["string", "null"]
        bloodGroup:
          type: ["string", "null"]
        sex:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        allergies:
          type: array
          items:
            type: string

    HealthTip:
      type: object
      required: [id, title, body, category, icon]
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        category:
          type: string
        icon:
          type: string

    WeeklyCheckup:
      type: object
      required: [id, userId, weekStart, wellnessScore, symptoms, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        weekStart:
          type: string
        wellnessScore:
          type: integer
        symptoms:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        aiSummary:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    WeeklyCheckupInput:
      type: object
      required: [wellnessScore, symptoms]
      properties:
        wellnessScore:
          type: integer
          minimum: 0
          maximum: 100
        symptoms:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]

    WellnessScore:
      type: object
      required: [score, trend]
      properties:
        score:
          type: integer
        trend:
          type: string
          enum: [up, down, stable, no_data]
        lastCheckup:
          type: ["string", "null"]

    OpenaiConversation:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time

    OpenaiMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    OpenaiConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    OpenaiMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    OpenaiConversationWithMessages:
      type: object
      required: [id, title, createdAt, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"

    OpenaiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
